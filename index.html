<body>

    <header>
        <nav class="nav-bar">

        </nav>

    <section class="landing-page">

    <main>

      <section></section>

        <div>
          <div class="heading_contact">
            <img src="./assets/icons/person_pin.svg" alt="contact pin" />
            <p>Contact form</p>
          </div>
          <article class="info" >
            <p >Have a question or an idea to collaborate?</p>
            <p >Get in touch—I'd love to hear from you and explore how we can work together.</p>
          </article>
        </div>
        <form action="">
          <label for="name">What's your name?</label>
          <input type="text" />

                <label for="mail">What's your e-mail?</label>
                <input type="text" />

                <label for="subject">How can I help?</label>
                <input type="text" />

                <label class="container">
                    I've read the privacy policy and agree to the processing of my data
                    as outlined.
                    <input type="checkbox" unchecked />
                    <span class="checkmark"></span>
                </label>

                <input type="submit" value="Submit" />
            </form>

    <footer>
