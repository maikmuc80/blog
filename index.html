<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./assets/style/standart.css" />
    <link rel="stylesheet" href="./assets/style/fonts.css" />
    <link rel="stylesheet" href="./assets/style/main_page.css" />

    <link rel="stylesheet" href="./assets/style/header_footer.css" />

    <title>Blog</title>
  </head>

  <body>
    <header class="header_content">
      <nav class="nav-bar">
        <img src="./assets/icons/logo 03 1.png" alt="Travelblog_logo" />
        <a href="">Highlights</a>
        <a href="">FAQ</a>
        <a href="">Contact</a>
      </nav>
    </header>

    <section class="landing-page"></section>

    <main class="main_content">
      <section></section>
      <section></section>
      <section class="contact_form">
        <div>
          <div class="heading_contact">
            <img src="./assets/icons/person_pin.svg" alt="contact pin" />
            <p>Contact form</p>
          </div>
          <article class="info">
            <p>Have a question or an idea to collaborate?</p>
            <p>
              Get in touch—I'd love to hear from you and explore how we can work
              together.
            </p>
          </article>
        </div>
        <form action="" class="contact_form_inputs">
          <div class="contact_inputs">
            <div class="input">
              <label for="name">What's your name?</label>
              <textarea name="name" id="name"></textarea>
            </div>

            <div class="input">
              <label for="mail">What's your e-mail?</label>
              <textarea name="mail" id="mail"></textarea>
            </div>
          </div>
          <label for="subject">How can I help?</label>
          <textarea name="subject" id="subject"></textarea>

          <label class="container">
            <input type="checkbox" unchecked />
            I've read the <s>privacy policy</s> and agree to the processing of my data
            as outlined.
            
            <span class="checkmark"></span>
          </label>

          <input type="submit" value="Submit" />
        </form>
      </section>
    </main>

    <footer class="footer_content">
      <div class="footer-imprint">
        <img src="./assets/icons/copyright.svg" alt="copyright_icon" />
        <div class="footer-imprint-text">
          <p>Travel Blog 2026</p>
          <p>Imprint</p>
          <p>Cookie Preferences</p>
        </div>
      </div>

      <div class="footer-socialmedia">
        <a href=""><img src="./assets/icons/Tiktok_icon 1.png" alt="" /></a>
        <a href=""><img src="./assets/icons/youtube.png" alt="" /></a>
        <a href=""><img src="./assets/icons/facebook.png" alt="" /></a>
        <a href=""
          ><img src="./assets/icons/Instagram_logo_2016 1.png" alt=""
        /></a>
      </div>
    </footer>
  </body>
</html>
